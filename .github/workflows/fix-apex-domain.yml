name: Fix Apex Domain

on: workflow_dispatch

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Add apex domain to Cloudflare Pages via Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 1fd1fec61abb9e0d34d5d4e7b2a513d9
        run: |
          npx wrangler pages domain add akankah.eu.org --project-name=trend-fashion-auto 2>&1 || true

      - name: Add @ CNAME via Wrangler (alternative)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          echo "Also trying DNS record creation..."
          RESPONSE=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=akankah.eu.org")
          echo "Zone lookup: $RESPONSE"
