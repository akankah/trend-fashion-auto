name: Fix Root Domain DNS

on: workflow_dispatch

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add CNAME @ via Cloudflare API
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          # Step 1: Get Zone ID
          echo "::group::Get Zone ID"
          RESPONSE=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=akankah.eu.org")
          echo "Response: $RESPONSE"
          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['success'])")
          if [ "$SUCCESS" != "True" ]; then
            echo "::error::Failed to get zone. Check CF_API_TOKEN permissions (needs Zone:Read)"
            echo "Errors: $(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('errors', []))")"
            exit 1
          fi
          ZONE_ID=$(echo "$RESPONSE" | python3 -c "
import sys,json
d=json.load(sys.stdin)
if d['result']:
    print(d['result'][0]['id'])
else:
    print('')
")
          if [ -z "$ZONE_ID" ]; then
            echo "::error::Zone 'akankah.eu.org' not found in Cloudflare. Add it manually first."
            exit 1
          fi
          echo "Zone ID: $ZONE_ID"
          echo "ZONE_ID=$ZONE_ID" >> $GITHUB_ENV
          echo "::endgroup::"

          # Step 2: Check if @ CNAME already exists
          echo "::group::Check existing DNS records"
          EXISTING=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=CNAME&name=akankah.eu.org")
          echo "$EXISTING" | python3 -c "
import sys,json
d=json.load(sys.stdin)
if d['result']:
    print(f\"Existing record found: {d['result'][0]['id']} -> {d['result'][0]['content']}\")
else:
    print('No existing @ CNAME record')
" || true
          echo "::endgroup::"

          # Step 3: Create @ CNAME
          echo "::group::Create @ CNAME"
          CREATE_RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "CNAME",
              "name": "akankah.eu.org",
              "content": "trend-fashion-auto.pages.dev",
              "proxied": true,
              "ttl": 1
            }')
          echo "Response: $CREATE_RESP"
          CREATE_OK=$(echo "$CREATE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['success'])")
          if [ "$CREATE_OK" = "True" ]; then
            echo "✅ CNAME @ created successfully"
          else
            echo "⚠️ Could not create DNS record (may already exist or permission issue)"
            echo "Errors: $(echo "$CREATE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('errors', []))")"
          fi
          echo "::endgroup::"

      - name: Add root domain to Cloudflare Pages via API
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: 1fd1fec61abb9e0d34d5d4e7b2a513d9
        run: |
          echo "::group::Add domain to Cloudflare Pages"
          RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/trend-fashion-auto/domains" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name": "akankah.eu.org"}')
          echo "Response: $RESP"
          OK=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['success'])")
          if [ "$OK" = "True" ]; then
            echo "✅ Domain akankah.eu.org added to Pages project"
          else
            echo "⚠️ Could not add domain (may already exist or permission issue)"
            echo "Errors: $(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('errors', []))")"
          fi
          echo "::endgroup::"

      - name: Verify DNS resolution
        run: |
          echo "::group::Verify DNS"
          sleep 15
          echo "Testing non-www..."
          curl -sI --max-time 10 "https://akankah.eu.org/" | head -5 || echo "❌ Non-www not resolving"
          echo ""
          echo "Testing www..."
          curl -sI --max-time 10 "https://www.akankah.eu.org/" | head -5 || echo "❌ www not resolving"
          echo "::endgroup::"
