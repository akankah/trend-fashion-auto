name: Auto Update

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/products.json'
  schedule:
    - cron: '0 */2 * * *'
    - cron: '30 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run crawler
        run: python crawler_playwright.py

      - name: Generate site
        run: python generate_site.py

      - name: Commit updated data back to repo
        run: |
          git config user.name "Auto Bot"
          git config user.email "bot@akankah.eu.org"
          git add data/products.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "auto-update data/products.json [skip ci]"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 1fd1fec61abb9e0d34d5d4e7b2a513d9
        run: npx wrangler pages deploy generated --project-name=trend-fashion-auto --branch=main

      - name: Ping search engines
        run: |
          for sm in \
            "https://www.akankah.eu.org/sitemap.xml" \
            "https://www.akankah.eu.org/sitemap-new.xml" \
            "https://www.akankah.eu.org/sitemap.txt"; do
            curl -sS "https://www.google.com/ping?sitemap=$sm" -o /dev/null
            curl -sS "https://www.bing.com/ping?sitemap=$sm" -o /dev/null
          done
          echo "Pinged Google & Bing with all sitemaps"
