<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - {{ site_name }}</title>
    <meta name="description" content="{{ description }}">
    <link rel="canonical" href="{{ site_url }}/{{ slug }}.html">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/">{{ site_name }}</a></h1>
        </div>
    </header>
    <div class="container">
        <nav><a href="/">Beranda</a> / {{ title }}</nav>
        <div class="page-content">
            <h1>{{ title }}</h1>
            {{ content }}
        </div>
    </div>
    <footer>
        <div class="container">
            <p>&copy; {{ site_name }} | <a href="/about.html">Tentang</a> | <a href="/contact.html">Kontak</a> | <a href="/privacy-policy.html">Privasi</a></p>
        </div>
    </footer>
</body>
</html>
